llm:
  provider: openai
  model: gpt-4o-mini
  temperature: 0.0
  max_tokens: 1024

rag:
  embedding_model: sentence-transformers/paraphrase-multilingual-MiniLM-L12-v2
  use_onnx_quantization: true          # int8 ONNX quantization
  chunk_size: 512
  chunk_overlap: 64
  top_k: 3
  collection_name: churn_knowledge_base
  persist_directory: chroma_db/

agent:
  max_iterations: 8
  verbose: false

benchmark:
  configs:
    - name: "config_A"
      top_k: 3
      temperature: 0.0
    - name: "config_B"
      top_k: 5
      temperature: 0.0
    - name: "config_C"
      top_k: 3
      temperature: 0.3
