name: CI

on:
  push:
    branches: ["feat/**", "fix/**", "retraining/**"]
  pull_request:
    branches: ["main"]

jobs:
  quality:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Setup Python 3.11
        run: uv python install 3.11

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Lint (ruff)
        run: uv run ruff check src/ tests/ || true

      - name: Create synthetic data for CI
        run: |
          mkdir -p data/raw
          uv run python - <<'EOF'
          import pandas as pd, numpy as np, pathlib

          rng = np.random.default_rng(42)
          n = 200

          internet_svcs = ["DSL", "Fiber optic", "No"]
          contracts     = ["Month-to-month", "One year", "Two year"]
          payments      = ["Electronic check", "Mailed check", "Bank transfer (automatic)", "Credit card (automatic)"]
          yes_no        = ["Yes", "No"]
          yes_no_ns     = ["Yes", "No", "No internet service"]

          df = pd.DataFrame({
              "customerID":       [f"CI-{i:04d}" for i in range(n)],
              "gender":           rng.choice(["Male", "Female"], n),
              "SeniorCitizen":    rng.integers(0, 2, n),
              "Partner":          rng.choice(yes_no, n),
              "Dependents":       rng.choice(yes_no, n),
              "tenure":           rng.integers(0, 73, n),
              "PhoneService":     rng.choice(yes_no, n),
              "MultipleLines":    rng.choice(["Yes", "No", "No phone service"], n),
              "InternetService":  rng.choice(internet_svcs, n),
              "OnlineSecurity":   rng.choice(yes_no_ns, n),
              "OnlineBackup":     rng.choice(yes_no_ns, n),
              "DeviceProtection": rng.choice(yes_no_ns, n),
              "TechSupport":      rng.choice(yes_no_ns, n),
              "StreamingTV":      rng.choice(yes_no_ns, n),
              "StreamingMovies":  rng.choice(yes_no_ns, n),
              "Contract":         rng.choice(contracts, n),
              "PaperlessBilling": rng.choice(yes_no, n),
              "PaymentMethod":    rng.choice(payments, n),
              "MonthlyCharges":   rng.uniform(18, 120, n).round(2),
              "TotalCharges":     rng.uniform(18, 8500, n).round(2).astype(str),
              "Churn":            rng.choice(yes_no, n, p=[0.265, 0.735]),
          })
          out = pathlib.Path("data/raw/WA_Fn-UseC_-Telco-Customer-Churn.csv")
          df.to_csv(out, index=False)
          print(f"CI dataset criado: {out} ({len(df)} linhas)")
          EOF

      - name: Execute notebook
        run: |
          uv run jupyter nbconvert \
            --to notebook \
            --execute \
            --ExecutePreprocessor.timeout=120 \
            --output /tmp/01_eda_executed.ipynb \
            notebooks/01_eda.ipynb
          echo "Notebook executado com sucesso"
        env:
          OPENAI_API_KEY: "sk-test-dummy-key-for-ci"

      - name: Unit tests (pytest)
        run: |
          uv run pytest tests/ -x \
            --cov=src \
            --cov-report=xml \
            --cov-fail-under=60 \
            --junitxml=test-results.xml
        env:
          OPENAI_API_KEY: "sk-test-dummy-key-for-ci"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            test-results.xml
            coverage.xml

  pipeline-check:
    name: DVC Pipeline Status
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Setup Python 3.11
        run: uv python install 3.11

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Validate params.yaml
        run: |
          uv run python -c "
          import yaml, sys
          with open('params.yaml') as f:
              p = yaml.safe_load(f)
          required = ['data', 'model', 'rag', 'drift', 'training']
          missing = [k for k in required if k not in p]
          if missing:
              print(f'params.yaml faltando chaves: {missing}')
              sys.exit(1)
          print('params.yaml OK:', list(p.keys()))
          "

      - name: Check DVC pipeline integrity
        run: uv run dvc dag --md || true

      - name: Check for stale stages (dvc status)
        run: |
          uv run dvc status --json 2>/dev/null | \
            uv run python -c "
          import json, sys
          data = json.load(sys.stdin)
          if data:
              print('Stages desatualizados detectados:')
              for stage, changes in data.items():
                  print(f'  {stage}: {changes}')
              print('Execute: dvc repro para sincronizar o pipeline')
          else:
              print('Pipeline DVC sincronizado — todos os stages atualizados')
          " || echo "dvc status indisponível (dados não rastreados)"

  model-validate:
    name: Model Metrics Validation
    runs-on: ubuntu-latest
    needs: [quality]
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Setup Python 3.11
        run: uv python install 3.11

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Validate model metrics against threshold
        run: |
          uv run python -c "
          import json, sys, yaml
          from pathlib import Path

          metrics_path = Path('evaluation/model_metrics.json')
          if not metrics_path.exists():
              print('evaluation/model_metrics.json não encontrado — pulando validação')
              sys.exit(0)

          with open('params.yaml') as f:
              params = yaml.safe_load(f)
          threshold = params['model']['min_auc_threshold']

          metrics = json.loads(metrics_path.read_text())
          auc = metrics.get('auc', 0)
          model_name = metrics.get('model_name', 'unknown')

          print(f'Modelo  : {model_name}')
          print(f'AUC     : {auc:.4f}')
          print(f'F1      : {metrics.get(\"f1\", 0):.4f}')
          print(f'Threshold: {threshold}')

          if not metrics.get('validation_passed', False):
              print(f'FALHA: AUC {auc:.4f} < threshold {threshold}')
              sys.exit(1)

          print('Validação OK')
          "

      - name: Upload model metrics
        uses: actions/upload-artifact@v4
        with:
          name: model-metrics
          path: evaluation/model_metrics.json
