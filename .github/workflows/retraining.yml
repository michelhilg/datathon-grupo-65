name: Retraining Pipeline

on:
  schedule:
    - cron: '0 6 * * 1'  # Toda segunda-feira às 6h UTC
  workflow_dispatch:
    inputs:
      reason:
        description: 'Motivo do retraining (drift_detected | manual | scheduled)'
        required: false
        default: 'manual'

permissions:
  contents: write
  pull-requests: write

jobs:
  champion-challenger:
    name: Champion-Challenger Evaluation
    runs-on: ubuntu-latest

    outputs:
      decision: ${{ steps.cc.outputs.decision }}
      challenger_run_id: ${{ steps.cc.outputs.challenger_run_id }}
      delta_auc: ${{ steps.cc.outputs.delta_auc }}

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Setup Python 3.11
        run: uv python install 3.11

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Generate synthetic data for CI
        run: |
          mkdir -p data/raw
          uv run python - <<'PYEOF'
          import pandas as pd, numpy as np, pathlib

          rng = np.random.default_rng(42)
          n = 200

          internet_svcs = ["DSL", "Fiber optic", "No"]
          contracts     = ["Month-to-month", "One year", "Two year"]
          payments      = ["Electronic check", "Mailed check", "Bank transfer (automatic)", "Credit card (automatic)"]
          yes_no        = ["Yes", "No"]
          yes_no_ns     = ["Yes", "No", "No internet service"]

          df = pd.DataFrame({
              "customerID":       [f"CI-{i:04d}" for i in range(n)],
              "gender":           rng.choice(["Male", "Female"], n),
              "SeniorCitizen":    rng.integers(0, 2, n),
              "Partner":          rng.choice(yes_no, n),
              "Dependents":       rng.choice(yes_no, n),
              "tenure":           rng.integers(0, 73, n),
              "PhoneService":     rng.choice(yes_no, n),
              "MultipleLines":    rng.choice(["Yes", "No", "No phone service"], n),
              "InternetService":  rng.choice(internet_svcs, n),
              "OnlineSecurity":   rng.choice(yes_no_ns, n),
              "OnlineBackup":     rng.choice(yes_no_ns, n),
              "DeviceProtection": rng.choice(yes_no_ns, n),
              "TechSupport":      rng.choice(yes_no_ns, n),
              "StreamingTV":      rng.choice(yes_no_ns, n),
              "StreamingMovies":  rng.choice(yes_no_ns, n),
              "Contract":         rng.choice(contracts, n),
              "PaperlessBilling": rng.choice(yes_no, n),
              "PaymentMethod":    rng.choice(payments, n),
              "MonthlyCharges":   rng.uniform(18, 120, n).round(2),
              "TotalCharges":     rng.uniform(18, 8500, n).round(2).astype(str),
              "Churn":            rng.choice(yes_no, n, p=[0.265, 0.735]),
          })
          out = pathlib.Path("data/raw/WA_Fn-UseC_-Telco-Customer-Churn.csv")
          df.to_csv(out, index=False)
          print(f"Dataset CI criado: {out} ({len(df)} linhas)")
          PYEOF

      - name: Champion-Challenger evaluation
        id: cc
        run: uv run python scripts/champion_challenger.py
        env:
          OPENAI_API_KEY: "sk-test-dummy-key-for-ci"

      - name: Show report
        if: always()
        run: |
          echo "=== Champion-Challenger Report ==="
          cat evaluation/champion_challenger_report.json || echo "Relatório não encontrado"
          echo ""
          echo "Decisão   : ${{ steps.cc.outputs.decision }}"
          echo "Delta AUC : ${{ steps.cc.outputs.delta_auc }}"
          echo "Run ID    : ${{ steps.cc.outputs.challenger_run_id }}"

      - name: Upload evaluation artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cc-evaluation-${{ github.run_id }}
          path: |
            evaluation/champion_challenger_report.json
            evaluation/model_metrics.json

      - name: Upload challenger model
        if: >
          steps.cc.outputs.decision == 'promote' ||
          steps.cc.outputs.decision == 'bootstrap'
        uses: actions/upload-artifact@v4
        with:
          name: challenger-model-${{ github.run_id }}
          path: model/

  # -------------------------------------------------------------------
  # Promote job: só executa se challenger supera champion.
  # O `environment: production` pausa o job e exige aprovação humana
  # antes de continuar — human-in-the-loop gate.
  # Pré-requisito: criar o Environment "production" em
  #   Settings → Environments → New environment → Required reviewers.
  # -------------------------------------------------------------------
  promote:
    name: "Promote challenger → champion (aguarda aprovação)"
    needs: champion-challenger
    if: >
      needs.champion-challenger.outputs.decision == 'promote' ||
      needs.champion-challenger.outputs.decision == 'bootstrap'
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: write
      pull-requests: write
      statuses: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: main

      - name: Download challenger model
        uses: actions/download-artifact@v4
        with:
          name: challenger-model-${{ github.run_id }}
          path: model/

      - name: Download evaluation artifacts
        uses: actions/download-artifact@v4
        with:
          name: cc-evaluation-${{ github.run_id }}
          path: evaluation/

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Create promotion branch and commit
        id: commit
        run: |
          BRANCH="retraining/promote-${{ github.run_id }}"
          git checkout -b "$BRANCH"
          git add -f model/ evaluation/model_metrics.json evaluation/champion_challenger_report.json
          if git diff --cached --exit-code > /dev/null 2>&1; then
            echo "Sem alterações para commitar — modelo já é idêntico."
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "feat(retraining): promove challenger para champion

          Decisão   : ${{ needs.champion-challenger.outputs.decision }}
          Delta AUC : ${{ needs.champion-challenger.outputs.delta_auc }}
          Run ID    : ${{ needs.champion-challenger.outputs.challenger_run_id }}
          Workflow  : ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            git push origin "$BRANCH"
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"
          fi

      - name: Report quality status for branch protection
        if: steps.commit.outputs.has_changes == 'true'
        run: |
          SHA=$(git rev-parse HEAD)
          gh api repos/${{ github.repository }}/statuses/$SHA \
            -X POST \
            -f state=success \
            -f context=quality \
            -f description="Retraining promote — somente artefatos de modelo alterados" \
            -f target_url="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Pull Request
        if: steps.commit.outputs.has_changes == 'true'
        run: |
          DECISION="${{ needs.champion-challenger.outputs.decision }}"
          DELTA="${{ needs.champion-challenger.outputs.delta_auc }}"
          RUN_ID="${{ needs.champion-challenger.outputs.challenger_run_id }}"
          BRANCH="${{ steps.commit.outputs.branch }}"

          gh pr create \
            --title "feat(retraining): promove challenger → champion (Δ AUC ${DELTA})" \
            --body "## Retraining — Promoção Champion-Challenger

          | Campo | Valor |
          |---|---|
          | Decisão | \`${DECISION}\` |
          | Delta AUC | \`${DELTA}\` |
          | Challenger Run ID | \`${RUN_ID}\` |
          | Motivo | \`${{ github.event.inputs.reason || 'scheduled' }}\` |
          | Workflow | [Ver execução](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) |

          ## Arquivos atualizados

          - \`model/\` — artefatos do challenger promovido
          - \`evaluation/model_metrics.json\` — métricas atualizadas
          - \`evaluation/champion_challenger_report.json\` — relatório CC completo

          ## Checklist de revisão

          - [ ] Delta AUC acima do threshold (\`min_delta_auc: 0.005\`)
          - [ ] Métricas em \`evaluation/champion_challenger_report.json\` são aceitáveis
          - [ ] Modelo exportado em \`model/\` está correto

          ---
          *Gerado automaticamente pelo pipeline de retraining. Aprovação humana concedida via GitHub Environment \`production\`.*" \
            --base main \
            --head "$BRANCH"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
